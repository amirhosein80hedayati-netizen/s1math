        const playSynthSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (type === 'correct') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(330, ctx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.3); 
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.4);
                } else if (type === 'wrong') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(180, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(90, ctx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.45);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.45);
                } else if (type === 'click') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(450, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.15);
                }
            } catch (e) {
                console.log("Audio logic bypassed.");
            }
        };

                hint: "عددی را پیدا کن که هم در جدول ضرب ۳ و هم در ۵ وجود دارد.",
                illustration: (
                    <div class="flex items-center justify-center gap-4 p-3 bg-amber-50/60 rounded-xl border border-amber-100">
                        <div class="flex items-center justify-center gap-2" dir="ltr">
                            <div class="w-16 h-16 rounded-full border border-orange-400 bg-orange-100/40 flex flex-col items-center justify-center text-center">
                                <span class="text-[9px] text-orange-600 block">مضرب ۳</span>
                                <span class="text-xs font-bold text-orange-800">3, 6, 9...</span>
                            </div>
                            <div class="w-16 h-16 rounded-full border-2 border-emerald-500 bg-emerald-100/50 flex flex-col items-center justify-center text-center animate-pulse">
                                <span class="text-[9px] text-emerald-700 block">مشترک</span>
                                <span class="text-sm font-black text-emerald-800">?</span>
                            </div>
                            <div class="w-16 h-16 rounded-full border border-amber-400 bg-amber-100/40 flex flex-col items-center justify-center text-center">
                                <span class="text-[9px] text-amber-600 block">مضرب ۵</span>
                                <span class="text-xs font-bold text-amber-800">5, 10, 20...</span>
                            </div>
                        </div>
                    </div>
                )
            },
            {
                id: 7,
                category: "الگوهای عددی (خطی)",
                categoryColor: "from-emerald-400 to-teal-500",
                question: "در الگوی عددی مقابل، عدد بعدی کدام است؟",
                options: [
                    { key: "الف", text: "۱۹", isCorrect: false },
                    { key: "ب", text: "۲۰", isCorrect: false },
                    { key: "ج", text: "۲۱", isCorrect: true },
                    { key: "د", text: "۲۲", isCorrect: false }
                ],
                hint: "فاصله بین هر دو عدد پشت سر هم چقدر است؟",
                illustration: (
                    <div class="flex flex-col items-center p-3 bg-emerald-50 rounded-xl border border-emerald-100">
                        <div class="flex items-center gap-2" dir="ltr">
                            <span class="text-base font-extrabold text-emerald-800">5</span>
                            <Icons.ChevronRight />
                            <span class="text-base font-extrabold text-emerald-800">9</span>
                            <Icons.ChevronRight />
                            <span class="text-base font-extrabold text-emerald-800">13</span>
                            <Icons.ChevronRight />
                            <span class="text-base font-extrabold text-emerald-800">17</span>
                            <Icons.ChevronRight />
                            <span class="px-2 py-0.5 bg-emerald-600 text-white rounded font-bold text-base shadow">?</span>
                        </div>
                        <span class="text-[10px] text-emerald-600 font-semibold mt-2 bg-white px-2 py-0.5 rounded border border-emerald-100">الگو با مقداری ثابت افزایش می‌یابد.</span>
                    </div>
                )
            },
            {
                id: 8,
                category: "الگوهای عددی (مربعی)",
                categoryColor: "from-emerald-400 to-teal-500",
                question: "هفتمین عدد در الگوی اعداد مربعی زیر کدام است؟",
                options: [
                    { key: "الف", text: "۳۶", isCorrect: false },
                    { key: "ب", text: "۴۹", isCorrect: true },
                    { key: "ج", text: "۲۵", isCorrect: false },
                    { key: "د", text: "۶۴", isCorrect: false }
                ],
                hint: "به ضرب هر شماره شکل در خودش فکر کن.",
                illustration: (
                    <div class="flex flex-col items-center p-3 bg-teal-50 rounded-xl border border-teal-100">
                        <div class="flex items-center justify-center gap-3 mb-2" dir="ltr">
                            <span class="text-sm font-bold text-teal-800">1</span>
                            <Icons.ArrowRightIcon />
                            <span class="text-sm font-bold text-teal-800">4</span>
                            <Icons.ArrowRightIcon />
                            <span class="text-sm font-bold text-teal-800">9</span>
                            <Icons.ArrowRightIcon />
                            <span class="text-sm font-bold text-teal-800">16</span>
                            <Icons.ArrowRightIcon />
                            <span class="text-sm font-bold text-gray-400">...</span>
                            <Icons.ArrowRightIcon />
                            <span class="px-2 py-0.5 bg-teal-600 text-white rounded font-bold text-xs shadow">شکل ۷</span>
                        </div>
                        <span class="text-[10px] text-teal-600">رابطه: (شماره شکل × شماره شکل)</span>
                    </div>
                )
            },
            {
                id: 9,
                category: "الگوهای عددی (مثلثی)",
                categoryColor: "from-emerald-400 to-teal-500",
                question: "ششمین عدد در الگوی اعداد مثلثی زیر کدام است؟",
                options: [
                    { key: "الف", text: "۱۵", isCorrect: false },
                    { key: "ب", text: "۲۱", isCorrect: true },
                    { key: "ج", text: "۱۸", isCorrect: false },
                    { key: "د", text: "۲۸", isCorrect: false }
                ],
                hint: "رابطه الگوی مثلثی: حاصل‌ضرب شماره شکل در شکل بعدی، تقسیم بر ۲.",
                illustration: (
                    <div class="flex flex-col items-center p-3 bg-emerald-50 rounded-xl border border-emerald-100">
                        <div class="flex items-center justify-center gap-2 mb-2" dir="ltr">
                            <span class="text-sm font-bold text-emerald-800">1</span>
                            <Icons.ChevronRight />
                            <span class="text-sm font-bold text-emerald-800">3</span>
                            <Icons.ChevronRight />
                            <span class="text-sm font-bold text-emerald-800">6</span>
                            <Icons.ChevronRight />
                            <span class="text-sm font-bold text-emerald-800">10</span>
                            <Icons.ChevronRight />
                            <span class="text-sm font-bold text-gray-400">...</span>
                            <Icons.ChevronRight />
                            <span class="px-2 py-0.5 bg-emerald-600 text-white rounded font-bold text-xs shadow">شکل ۶</span>
                        </div>
                        <span class="text-[10px] text-emerald-600">فرمول: ۲ / [(شماره شکل + ۱) × شماره شکل]</span>
                    </div>
                )
            },
            {
                id: 10,
                category: "الگوهای عددی (مستطیلی)",
                categoryColor: "from-emerald-400 to-teal-500",
                question: "پنجمین عدد در الگوی اعداد مستطیلی زیر کدام است؟",
                options: [
                    { key: "الف", text: "۲۵", isCorrect: false },
                    { key: "ب", text: "۲۸", isCorrect: false },
                    { key: "ج", text: "۳۰", isCorrect: true },
                    { key: "د", text: "۳۶", isCorrect: false }
                ],
                hint: "رابطه الگوی مستطیلی: ضرب هر شماره شکل در عدد بعدی‌اش.",
                illustration: (
                    <div class="flex flex-col items-center p-3 bg-teal-50 rounded-xl border border-teal-100">
                        <div class="flex items-center justify-center gap-2 mb-2" dir="ltr">
                            <span class="text-sm font-bold text-teal-800">2</span>
                            <Icons.ArrowRightIcon />
                            <span class="text-sm font-bold text-teal-800">6</span>
                            <Icons.ArrowRightIcon />
                            <span class="text-sm font-bold text-teal-800">12</span>
                            <Icons.ArrowRightIcon />
                            <span class="text-sm font-bold text-teal-800">20</span>
                            <Icons.ArrowRightIcon />
                            <span class="text-sm font-bold text-gray-400">...</span>
                            <Icons.ArrowRightIcon />
                            <span class="px-2 py-0.5 bg-teal-600 text-white rounded font-bold text-xs shadow">شکل ۵</span>
                        </div>
                        <span class="text-[10px] text-teal-600">فرمول: شماره شکل × (شماره شکل + ۱)</span>
                    </div>
                )
            }
        ];

        function App() {
            const [gameState, setGameState] = useState('intro'); 
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [score, setScore] = useState(0);
            const [showHint, setShowHint] = useState(false);
            const [answersStatus, setAnswersStatus] = useState(Array(10).fill(null));

            const currentQuestion = quizData[currentQuestionIndex];

            const handleStartQuiz = () => {
                playSynthSound('click');
                setGameState('quiz');
                setCurrentQuestionIndex(0);
                setScore(0);
                setSelectedOption(null);
                setShowHint(false);
                setAnswersStatus(Array(10).fill(null));
            };

            const handleOptionClick = (option) => {
                playSynthSound('click');
                setSelectedOption(option);
                
                setTimeout(() => {
                    if (option.isCorrect) {
                        playSynthSound('correct');
                        setGameState('feedback-correct');
                        if (answersStatus[currentQuestionIndex] === null) {
                            setScore(prev => prev + 1);
                            const updated = [...answersStatus];
                            updated[currentQuestionIndex] = true;
                            setAnswersStatus(updated);
                        }
                    } else {
                        playSynthSound('wrong');
                        setGameState('feedback-wrong');
                        if (answersStatus[currentQuestionIndex] === null) {
                            const updated = [...answersStatus];
                            updated[currentQuestionIndex] = false;
                            setAnswersStatus(updated);
                        }
                    }
                }, 300);
            };

            const handleNextQuestion = () => {
                playSynthSound('click');
                setSelectedOption(null);
                setShowHint(false);
                if (currentQuestionIndex < quizData.length - 1) {
                    setCurrentQuestionIndex(prev => prev + 1);
                    setGameState('quiz');
                } else {
                    setGameState('score');
                }
            };

            const handleTryAgain = () => {
                playSynthSound('click');
                setSelectedOption(null);
                setGameState('quiz');
            };

            const handlePreviousQuestion = () => {
                if (currentQuestionIndex > 0) {
                    playSynthSound('click');
                    setSelectedOption(null);
                    setShowHint(false);
                    setCurrentQuestionIndex(prev => prev - 1);
                    setGameState('quiz');
                }
            };

            const handleGoHome = () => {
                playSynthSound('click');
                setGameState('intro');
            };

            const getStars = () => {
                if (score >= 9) return 3;
                if (score >= 6) return 2;
                return 1;
            };

            return (
                <div class="bg-white rounded-3xl border-8 border-yellow-700/80 shadow-2xl overflow-hidden relative" style={{ aspectRatio: "16/9", minHeight: "510px" }}>
                    
                    {/* Classroom Top Header */}
                    <div class="bg-amber-800 text-amber-100 px-6 py-3 flex items-center justify-between border-b-4 border-amber-900 shadow">
                        <div class="flex items-center gap-2 font-bold text-sm lg:text-base">
                            <Icons.Chalkboard />
                            <span class="mr-2">ریاضی ششم ابتدایی - فصل اول: الگوهای عددی</span>
                        </div>
                        {gameState !== 'intro' && gameState !== 'score' && (
                            <div class="flex items-center gap-4 text-xs lg:text-sm">
                                <span class="bg-amber-900/60 px-3 py-1 rounded-full text-yellow-300 font-bold">
                                    امتیاز: {toPersian(score)} از {toPersian(quizData.length)}
                                </span>
                                <span class="bg-amber-950 px-3 py-1 rounded-md font-medium text-amber-200">
                                    سوال {toPersian(currentQuestionIndex + 1)} از {toPersian(quizData.length)}
                                </span>
                            </div>
                        )}
                        <button onClick={handleGoHome} class="text-amber-200 hover:text-white transition duration-200 focus:outline-none">
                            <Icons.Home />
                        </button>
                    </div>

                    <div class="p-5 md:p-6 flex flex-col justify-between h-[calc(100%-60px)] relative bg-slate-50">

                        {/* Intro Slide */}
                        {gameState === 'intro' && (
                            <div class="flex flex-col items-center justify-center text-center my-auto py-2">
                                <div class="bg-emerald-600 text-white rounded-3xl p-6 shadow-xl max-w-lg border-4 border-white transform hover:scale-105 transition-transform duration-300">
                                    <div class="mb-3">
                                        <Icons.Graduation />
                                    </div>
                                    <h1 class="text-2xl md:text-3xl font-extrabold mb-2 leading-snug">کوییز تعاملی الگوهای عددی</h1>
                                    <p class="text-xs md:text-sm text-emerald-50 font-medium mb-5">
                                        خودت را در زمینه‌های اعداد زوج و فرد، مسائل صف، مضرب‌ها و الگوهای هندسی به چالش بکش!
                                    </p>
                                    <button 
                                        onClick={handleStartQuiz}
                                        class="bg-yellow-400 hover:bg-yellow-300 text-emerald-950 font-black text-base py-3 px-8 rounded-full shadow-md hover:shadow-lg transform hover:-translate-y-0.5 active:translate-y-0 transition-all duration-150 inline-flex items-center gap-2 focus:ring-4 focus:ring-yellow-200 focus:outline-none"
                                    >
                                        <span>شروع چالش ریاضی</span>
                                        <Icons.Play />
                                    </button>
                                </div>
                                <div class="flex gap-4 mt-4 text-emerald-800 text-[11px] font-bold">
                                    <span class="bg-emerald-100/80 px-3 py-1 rounded-full"><Icons.CheckDouble /> ۱۰ سوال کاربردی کتاب</span>
                                    <span class="bg-emerald-100/80 px-3 py-1 rounded-full"><Icons.Sparkles /> راهنمای کوتاه آموزشی</span>
                                </div>
                            </div>
                        )}

                        {/* Question Slide */}
                        {gameState === 'quiz' && (
                            <div class="grid grid-cols-1 md:grid-cols-12 gap-5 items-center my-auto h-full">
                                <div class="md:col-span-7 flex flex-col justify-between h-full gap-3">
                                    <div>
                                        <span class={`inline-block bg-gradient-to-r ${currentQuestion.categoryColor} text-white font-bold text-[10px] px-3 py-0.5 rounded-full shadow-sm mb-2`}>
                                            {currentQuestion.category}
                                        </span>
                                        <h2 class="text-base md:text-lg font-black text-slate-800 mb-2 leading-relaxed">
                                            {toPersian(currentQuestion.id)}. {currentQuestion.question}
                                        </h2>
                                    </div>

                                    <div class="flex-grow flex items-center justify-center my-0.5">
                                        <div class="w-full max-w-sm">
                                            {currentQuestion.illustration}
                                        </div>
                                    </div>

                                    <div class="min-h-[40px]">
                                        {showHint ? (
                                            <div class="bg-yellow-50 border-r-4 border-yellow-400 p-2 rounded-l-lg flex items-start gap-1.5 animate-scale-up">
                                                <Icons.Lightbulb />
                                                <p class="text-[11px] text-yellow-800 font-bold leading-relaxed">{currentQuestion.hint}</p>
                                            </div>
                                        ) : (
                                            <button 
                                                onClick={() => { playSynthSound('click'); setShowHint(true); }}
                                                class="text-[11px] text-indigo-600 font-bold hover:text-indigo-800 transition duration-200 inline-flex items-center gap-1 focus:outline-none"
                                            >
                                                <Icons.Question />
                                                <span>به یک سرنخ کوچک آموزشی نیاز داری؟ کلیک کن!</span>
                                            </button>
                                        )}
                                    </div>
                                </div>

                                <div class="md:col-span-5 flex flex-col justify-center gap-2">
                                    {currentQuestion.options.map((option, idx) => {
                                        return (
                                            <button
                                                key={idx}
                                                onClick={() => handleOptionClick(option)}
                                                disabled={selectedOption !== null}
                                                class={`w-full text-right p-3 rounded-xl border-2 transition-all duration-200 flex items-center justify-between text-xs md:text-sm font-bold shadow-sm focus:outline-none focus:ring-1 focus:ring-offset-1
                                                    ${selectedOption === null 
                                                        ? 'bg-white border-slate-200 hover:border-indigo-400 hover:bg-indigo-50/50 hover:shadow active:scale-[0.99]' 
                                                        : selectedOption === option 
                                                            ? option.isCorrect 
                                                                ? 'bg-emerald-50 border-emerald-500 text-emerald-800 shadow-md ring-2 ring-emerald-300'
                                                                : 'bg-rose-50 border-rose-500 text-rose-800 shadow-md ring-2 ring-rose-300 animate-shake'
                                                            : 'bg-gray-50 border-gray-100 text-gray-400 opacity-60'
                                                    }`}
                                            >
                                                <div class="flex items-center gap-2">
                                                    <span class={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black shadow-sm ml-2
                                                        ${selectedOption === null 
                                                            ? 'bg-indigo-100 text-indigo-700' 
                                                            : selectedOption === option 
                                                                ? option.isCorrect ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white'
                                                                : 'bg-gray-200 text-gray-400'
                                                        }`}
                                                    >
                                                        {option.key}
                                                    </span>
                                                    <span>{option.text}</span>
                                                </div>
                                                {selectedOption === option && (
                                                    option.isCorrect ? <Icons.CheckCircle /> : <Icons.XCircle />
                                                )}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* Interactive Correct Feedback Slide */}
                        {gameState === 'feedback-correct' && (
                            <div class="flex flex-col items-center justify-center text-center my-auto max-w-sm mx-auto p-5 bg-emerald-50 rounded-3xl border-4 border-emerald-400 shadow-xl">
                                <div class="w-14 h-14 bg-emerald-500 text-white rounded-full flex items-center justify-center text-2xl shadow-lg mb-3 animate-bounce">
                                    <Icons.ThumbsUp />
                                </div>
                                <h2 class="text-xl md:text-2xl font-black text-emerald-800 mb-1">عالی و درخشان بود!</h2>
                                <p class="text-xs md:text-sm text-emerald-700 font-medium mb-4">
                                    پاسخ شما کاملاً درست است. آفرین بر این دقت و هوش ریاضی!
                                </p>
                                <button 
                                    onClick={handleNextQuestion}
                                    class="bg-emerald-600 hover:bg-emerald-500 text-white font-black text-xs md:text-sm py-2.5 px-6 rounded-full shadow-md hover:shadow-lg transition-all duration-150 inline-flex items-center gap-1.5 focus:ring-2 focus:ring-emerald-200 focus:outline-none"
                                >
                                    <span>سوال بعدی</span>
                                    <Icons.ArrowLeft />
                                </button>
                            </div>
                        )}

                        {/* Interactive Wrong Feedback Slide */}
                        {gameState === 'feedback-wrong' && (
                            <div class="flex flex-col items-center justify-center text-center my-auto max-w-sm mx-auto p-5 bg-rose-50 rounded-3xl border-4 border-rose-400 shadow-xl">
                                <div class="w-12 h-12 bg-rose-500 text-white rounded-full flex items-center justify-center text-xl shadow-lg mb-3">
                                    <Icons.RotateLeft />
                                </div>
                                <h2 class="text-xl md:text-2xl font-black text-rose-800 mb-1">دوباره تلاش کن!</h2>
                                <p class="text-xs md:text-sm text-rose-700 font-medium mb-4">
                                    کمی تمرکز کن، راهنما و شکل را دوباره ببین و یک‌بار دیگر امتحان کن.
                                </p>
                                <div class="flex gap-2">
                                    <button 
                                        onClick={handleTryAgain}
                                        class="bg-rose-600 hover:bg-rose-500 text-white font-black text-xs py-2 px-4 rounded-full shadow-md hover:shadow-lg transition-all duration-150 inline-flex items-center gap-1 focus:ring-2 focus:ring-rose-200 focus:outline-none"
                                    >
                                        <span>برگشت به سوال</span>
                                    </button>
                                    <button 
                                        onClick={handleNextQuestion}
                                        class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold text-xs py-2 px-3 rounded-full transition-all duration-150 focus:outline-none"
                                    >
                                        <span>رد شدن از سوال</span>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Score/Congratulation Slide */}
                        {gameState === 'score' && (
                            <div class="flex flex-col items-center justify-center text-center my-auto py-1">
                                <div class="bg-indigo-900 text-white p-5 rounded-3xl shadow-2xl max-w-md border-4 border-white/20">
                                    
                                    <div class="flex justify-center gap-2 mb-3">
                                        {[1, 2, 3].map((star) => (
                                            <Icons.Star key={star} filled={star <= getStars()} />
                                        ))}
                                    </div>

                                    <h2 class="text-xl md:text-2xl font-black mb-1.5 text-yellow-300">آزمون به پایان رسید!</h2>
                                    <p class="text-[11px] text-indigo-200 font-medium mb-4">
                                        مبحت عدد و الگوهای عددی ریاضی ششم دبستان را با موفقیت تمرین کردی.
                                    </p>

                                    <div class="grid grid-cols-2 gap-3 max-w-xs mx-auto mb-5">
                                        <div class="bg-white/10 p-2 rounded-xl border border-white/10 text-center">
                                            <span class="text-[10px] block text-indigo-300">پاسخ‌های درست</span>
                                            <span class="text-base font-extrabold text-white">{toPersian(score)} از {toPersian(quizData.length)}</span>
                                        </div>
                                        <div class="bg-white/10 p-2 rounded-xl border border-white/10 text-center">
                                            <span class="text-[10px] block text-indigo-300">درصد موفقیت</span>
                                            <span class="text-base font-extrabold text-white">{toPersian(Math.round((score / quizData.length) * 100))}٪</span>
                                        </div>
                                    </div>

                                    <div class="flex justify-center gap-2">
                                        <button 
                                            onClick={handleStartQuiz}
                                            class="bg-yellow-400 hover:bg-yellow-300 text-indigo-950 font-black text-xs py-2.5 px-5 rounded-full shadow-md hover:shadow-lg transition duration-150 inline-flex items-center gap-1.5 focus:outline-none"
                                        >
                                            <span>آزمون مجدد</span>
                                        </button>
                                        <button 
                                            onClick={handleGoHome}
                                            class="bg-white/20 hover:bg-white/30 text-white font-bold text-xs py-2.5 px-4 rounded-full transition duration-150 focus:outline-none"
                                        >
                                            <span>صفحه اصلی</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Navigation Footer */}
                        {gameState !== 'intro' && gameState !== 'score' && (
                            <div class="flex items-center justify-between border-t border-slate-200 pt-3 mt-1">
                                <button
                                    onClick={handlePreviousQuestion}
                                    disabled={currentQuestionIndex === 0}
                                    class={`px-3 py-1.5 rounded-lg text-xs font-bold transition duration-150 flex items-center gap-1 focus:outline-none
                                        ${currentQuestionIndex === 0 
                                            ? 'text-slate-300 cursor-not-allowed' 
                                            : 'text-slate-600 hover:bg-slate-100'
                                        }`}
                                Social>
                                    <Icons.ArrowRight />
                                    <span class="mr-1">سوال قبلی</span>
                                </button>
                                
                                <div class="flex gap-1">
                                    {quizData.map((_, idx) => (
                                        <span 
                                            key={idx} 
                                            class={`w-2 h-2 rounded-full transition-all duration-200
                                                ${idx === currentQuestionIndex 
                                                    ? 'bg-indigo-600 scale-125' 
                                                    : answersStatus[idx] === true 
                                                        ? 'bg-emerald-500' 
                                                        : answersStatus[idx] === false 
                                                            ? 'bg-rose-400' 
                                                            : 'bg-slate-300'
                                                }`}
                                        ></span>
                                    ))}
                                </div>

                                <button
                                    onClick={handleNextQuestion}
                                    class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-lg transition duration-150 flex items-center gap-1 shadow focus:outline-none"
                                >
                                    <span>{currentQuestionIndex === quizData.length - 1 ? 'پایان کوییز' : 'سوال بعدی'}</span>
                                    <Icons.ArrowLeft />
                                </button>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
