<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بخش‌پذیری</title>
    <!-- بارگذاری نسخه جدید Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- bar gozari React va ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- bar gozari Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- فونت آیکون‌های متریال -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://v1.fontapi.ir/css/Vazir');
        body {
            font-family: 'Vazir', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // آیکون ستاره طلایی
        const StarIcon = () => (
          <svg className="w-5 h-5 text-amber-500 animate-pulse" fill="currentColor" viewBox="0 0 20 20">
            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
          </svg>
        );

        function App() {
          const [totalItems, setTotalItems] = useState(12); // تعداد کل مکعب‌ها
          const [rowCount, setRowCount] = useState(3);       // تعداد ردیف‌ها

          // محاسبات هندسی و ریاضی
          const colCount = Math.floor(totalItems / rowCount); 
          const remainder = totalItems % rowCount;           
          const isDivisible = remainder === 0;               

          // هماهنگ‌سازی خودکار اسلایدر ردیف‌ها با تعداد کل مکعب‌ها
          useEffect(() => {
            if (rowCount > totalItems) {
              setRowCount(Math.max(1, totalItems));
            }
          }, [totalItems]);

          return (
            <div className="min-h-screen bg-gradient-to-tr from-slate-50 via-teal-50/10 to-indigo-50/10 text-slate-800 flex flex-col font-sans select-none overflow-y-auto pb-12" dir="rtl">
              
              {/* هدر بالایی سفید و مدرن */}
              <header className="border-b border-slate-200/80 bg-white/80 backdrop-blur sticky top-0 z-50 px-4 py-4 sm:px-6 shadow-sm shadow-slate-100">
                <div className="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center gap-3">
                    <div className="bg-gradient-to-tr from-emerald-500 to-teal-400 p-2.5 rounded-2xl shadow-md shadow-emerald-500/10">
                      <span className="material-icons text-white font-bold text-2xl">grid_view</span>
                    </div>
                    <div>
                      <h1 className="text-xl sm:text-2xl font-black bg-gradient-to-r from-slate-800 to-slate-900 bg-clip-text">
                        بخش‌پذیری
                      </h1>
                      <p className="text-xs text-emerald-600 mt-1 font-medium">
                        آموزش تصویری، پویا و زنده مفاهیم پایه ریاضیات ششم ابتدایی
                      </p>
                    </div>
                  </div>
                </div>
              </header>

              {/* بدنه اصلی برنامه */}
              <main className="flex-grow max-w-6xl w-full mx-auto px-4 sm:px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                {/* ستون راست: تنظیمات و فرمول‌ها */}
                <section className="lg:col-span-5 flex flex-col gap-6">
                  
                  {/* کارت سفید رنگ نمایش فرمول ریاضی زنده */}
                  <div className="bg-white rounded-2xl p-6 border border-slate-200/60 shadow-xl shadow-slate-100 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-32 h-32 bg-emerald-50/5 rounded-full blur-2xl"></div>
                    
                    <div className="flex justify-between items-center mb-4">
                      <h2 className="text-xs font-bold text-slate-400">عبارت ریاضی تقسیم</h2>
                      <span className={`text-xs px-3 py-1 rounded-full font-bold ${
                        isDivisible 
                          ? 'bg-emerald-50 text-emerald-700 border border-emerald-150 animate-pulse' 
                          : 'bg-amber-50 text-amber-700 border border-amber-150'
                      }`}>
                        {isDivisible ? 'بخش‌پذیر (باقی‌مانده صفر)' : 'بخش‌پذیر نیست (باقی‌مانده دارد)'}
                      </span>
                    </div>

                    {/* نمایش تقسیم از چپ به راست استاندارد */}
                    <div className="flex flex-col items-center justify-center py-6 bg-slate-50/60 rounded-xl border border-slate-100" dir="ltr">
                      <div className="flex items-center gap-3 text-3xl sm:text-4xl font-extrabold text-slate-800 font-mono">
                        {/* مقسوم */}
                        <span className="text-emerald-600 bg-emerald-50 px-4 py-2 rounded-xl border border-emerald-100/80 shadow-sm" title="مقسوم (کل مکعب‌ها)">{totalItems}</span>
                        
                        <span className="text-slate-400 font-normal">÷</span>
                        
                        {/* مقسوم‌علیه */}
                        <span className="text-indigo-600 bg-indigo-50 px-4 py-2 rounded-xl border border-indigo-100/80 shadow-sm" title="مقسوم‌علیه (ردیف‌ها)">{rowCount}</span>
                        
                        <span className="text-slate-400 font-normal">=</span>
                        
                        {/* خارج‌قسمت */}
                        <span className="text-teal-600 bg-teal-50 px-4 py-2 rounded-xl border border-teal-100/80 shadow-sm" title="خارج‌قسمت (ستون‌های کامل)">{colCount}</span>
                        
                        {/* نمایش زیبای باقی‌مانده از راست به چپ */}
                        {remainder > 0 && (
                          <div className="flex items-center gap-1 text-sm ml-2 font-sans text-amber-600 font-bold" dir="rtl">
                            <span>(باقیمانده: {remainder})</span>
                          </div>
                        )}
                      </div>
                      
                      <p className="text-xs sm:text-sm text-slate-500 mt-5 text-center px-6 leading-relaxed" dir="rtl">
                        اگر <span className="text-emerald-600 font-bold">{totalItems}</span> مکعب را در <span className="text-indigo-600 font-bold">{rowCount}</span> ردیف بچینیم، در هر ردیف <span className="text-teal-600 font-bold">{colCount}</span> مکعب قرار می‌گیرد و <span className="text-amber-600 font-bold">{remainder === 0 ? 'هیچ مکعبی' : `${remainder} مکعب`}</span> باقی می‌ماند.
                      </p>
                    </div>
                  </div>

                  {/* کارت اسلایدرها و کنترل‌ها */}
                  <div className="bg-white rounded-2xl p-6 border border-slate-200/60 shadow-xl shadow-slate-100 flex flex-col gap-6">
                    
                    {/* اسلایدر اول: تعداد کل مکعب‌ها */}
                    <div className="flex flex-col gap-3">
                      <div className="flex justify-between items-center text-sm">
                        <span className="font-bold text-slate-700 flex items-center gap-2">
                          <span className="w-3 h-3 rounded-full bg-emerald-400"></span>
                          ۱. تعداد کل مکعب‌ها (مقسوم):
                        </span>
                        <span className="text-emerald-600 font-bold bg-emerald-50 px-3 py-1 rounded-lg border border-emerald-100 text-sm">
                          {totalItems} مکعب
                        </span>
                      </div>
                      <div dir="ltr" className="w-full py-2">
                        <input 
                          type="range" 
                          min="1" 
                          max="24" 
                          value={totalItems}
                          onChange={(e) => setTotalItems(parseInt(e.target.value))}
                          className="w-full accent-emerald-500 bg-slate-200 h-2 rounded-lg cursor-pointer appearance-none"
                        />
                      </div>
                      <span className="text-xs text-slate-400">
                        کل مهره‌ها یا مکعب‌هایی که قصد داریم دسته‌بندی کنیم.
                      </span>
                    </div>

                    {/* اسلایدر دوم: تعداد ردیف‌ها */}
                    <div className="flex flex-col gap-3">
                      <div className="flex justify-between items-center text-sm">
                        <span className="font-bold text-slate-700 flex items-center gap-2">
                          <span className="w-3 h-3 rounded-full bg-indigo-400"></span>
                          ۲. تعداد ردیف‌ها (مقسوم‌علیه):
                        </span>
                        <span className="text-indigo-600 font-bold bg-indigo-50 px-3 py-1 rounded-lg border border-indigo-100 text-sm">
                          {rowCount} ردیف
                        </span>
                      </div>
                      <div dir="ltr" className="w-full py-2">
                        <input 
                          type="range" 
                          min="1" 
                          max={totalItems} 
                          value={rowCount}
                          onChange={(e) => setRowCount(parseInt(e.target.value))}
                          className="w-full accent-indigo-500 bg-slate-200 h-2 rounded-lg cursor-pointer appearance-none"
                        />
                      </div>
                      <div className="flex justify-between text-xs text-slate-400">
                        <span>حداقل: ۱ ردیف</span>
                        <span>حداکثر: {totalItems} ردیف</span>
                      </div>
                    </div>

                  </div>
                </section>

                {/* ستون چپ: نمایش گرافیکی و هندسی مکعب‌ها */}
                <section className="lg:col-span-7 flex flex-col gap-6">
                  
                  {/* مانیتور نمایش مکعب‌ها */}
                  <div className="bg-white rounded-2xl p-6 border border-slate-200/60 shadow-2xl shadow-slate-200/50 flex flex-col items-center justify-center relative min-h-[380px]">
                    
                    <div className="w-full flex items-center justify-between mb-6">
                      <span className="text-xs font-bold text-slate-400 flex items-center gap-2">
                        <span className="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
                        چیدمان و هندسه نمایش زنده مکعب‌ها
                      </span>
                      
                      {isDivisible ? (
                        <div className="flex items-center gap-1.5 text-xs bg-emerald-50 text-emerald-600 border border-emerald-200 px-3 py-1.5 rounded-full font-bold">
                          <StarIcon />
                          <span>چیدمان کامل مستطیلی!</span>
                        </div>
                      ) : (
                        <div className="text-xs bg-amber-50 text-amber-600 border border-amber-250 px-3 py-1.5 rounded-full font-bold">
                          <span>ردیف ناقص (باقی‌مانده دارد)</span>
                        </div>
                      )}
                    </div>

                    <div className="flex flex-col md:flex-row items-center justify-center gap-8 w-full max-w-md py-6">
                      
                      {/* شبکه دوبعدی مستطیل */}
                      <div className="flex flex-col gap-2.5 p-5 bg-slate-50/50 rounded-2xl border-2 border-dashed border-slate-200 shadow-inner relative" dir="ltr">
                        {colCount > 0 ? (
                          Array.from({ length: rowCount }).map((_, rIdx) => (
                            <div key={rIdx} className="flex gap-2.5">
                              {Array.from({ length: colCount }).map((_, cIdx) => (
                                <div 
                                  key={cIdx} 
                                  className="w-10 h-10 rounded-xl bg-gradient-to-tr from-emerald-500 to-teal-400 shadow-md shadow-emerald-200/60 border border-emerald-300/40 transform hover:scale-110 transition-all flex items-center justify-center text-xs font-mono font-bold text-white"
                                >
                                  {(rIdx * colCount) + cIdx + 1}
                                </div>
                              ))}
                            </div>
                          ))
                        ) : (
                          <div className="text-xs text-slate-400 py-8 text-center px-6" dir="rtl">
                            تعداد ردیف‌ها زیاد است؛ هنوز ستونی ساخته نشده.
                          </div>
                        )}

                        {/* نشان‌دهنده تعداد ردیف‌ها */}
                        <div className="absolute -right-7 top-1/2 -translate-y-1/2 flex flex-col items-center" dir="rtl">
                          <div className="w-1.5 h-full min-h-[32px] border-r border-y border-slate-300 rounded-r"></div>
                          <span className="text-[10px] text-indigo-600 font-bold bg-white border border-slate-200 px-1.5 py-0.5 rounded shadow-sm mt-1 whitespace-nowrap">
                            {rowCount} ردیف
                          </span>
                        </div>

                        {/* نشان‌دهنده تعداد ستون‌ها */}
                        {colCount > 0 && (
                          <div className="absolute -top-7 left-1/2 -translate-x-1/2 flex flex-row items-center" dir="rtl">
                            <span className="text-[10px] text-teal-600 font-bold bg-white border border-slate-200 px-2 py-0.5 rounded shadow-sm whitespace-nowrap">
                              {colCount} ستون کامل
                            </span>
                          </div>
                        )}
                      </div>

                      {/* سینی زرد رنگ مکعب‌های باقی‌مانده */}
                      {remainder > 0 && (
                        <div className="flex flex-col items-center justify-center p-4 bg-amber-50/40 rounded-2xl border-2 border-dashed border-amber-200/80 shadow-sm min-w-[120px]">
                          <span className="text-xs text-amber-600 font-bold mb-3">
                            باقی‌مانده
                          </span>
                          
                          <div className="grid grid-cols-2 gap-2" dir="ltr">
                            {Array.from({ length: remainder }).map((_, idx) => (
                              <div 
                                key={idx} 
                                className="w-10 h-10 rounded-xl bg-gradient-to-tr from-amber-400 to-yellow-300 border border-amber-200 shadow-sm transform hover:scale-105 transition-all flex items-center justify-center text-xs font-bold text-amber-950"
                              >
                                +{idx + 1}
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                    </div>

                  </div>
                </section>

              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
